<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registering page</title>
    <link rel="stylesheet" href="registering_form.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="register_form">
        <form method="post" onsubmit="handleRegister(event)">
            <header><i class="fas fa-user-plus"></i> REGISTER HERE</header>

            <div class="form-group">
                <div class="input-icon">
                    <i class="fas fa-user"></i>
                    <input type="text" id="username" name="username" placeholder="Choose your username" required>
                </div>
            </div>

            <div class="form-group">
                <div class="input-icon">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>
            </div>

            <div class="form-group">
                <div class="input-icon">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" name="password" placeholder="Create a password" required>
                </div>
            </div>

            <input type="submit" value="Register" class="submit-btn">
            <p class="login-link">Already have an account? <a href="login_form.html">Login here</a></p>
        </form>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const stored = localStorage.getItem('username');
            if (stored) {
                window.location.href = 'dashboard.html';
            }
        });

        function handleRegister(event) {
            event.preventDefault();
            const username = document.getElementById('username').value;
            localStorage.setItem('username', username);
            window.location.href = 'dashboard.html';
        }
    </script>
    
</body>
</html>
